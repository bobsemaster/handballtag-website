version: "3"
services:
  client:
    build:
      context: client
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - 8080:8080
    volumes:
      - ./downloads:/usr/share/nginx/html/client/downloads
  one-drive-sync:
    image: server:0.0.1-SNAPSHOT
    restart: always

    ports:
      - 8082:8080

    volumes:
      - ./downloads:/downloads
